# Welcome to Tegneklubben — a drawing and painting event hub in Copenhagen

# Site settings
title: Tegneklubben
description: >-
  Tegneklubben samler tegne- og maleentusiaster i hovedstaden.
  Find arrangementer, mød ligesindede og del dine oplevelser.
baseurl: ""
url: "https://tegneklubben.dk"

# Organization info
author:
  name: Tegneklubben
  email: kontakt@tegneklubben.dk

# Social media (update with actual links)
social:
  instagram: https://instagram.com/tegneklubbenkoe
  facebook: https://facebook.com/tegneklubbenkoe
  type: organization

# Locale & Language (Danish)
locale: da_DK
lang: da
timezone: Europe/Copenhagen
date_format: "%d.%m.%Y"
encoding: UTF-8

# Collections for events and artworks
collections:
  events:
    output: true
    sort_by: date
    permalink: /arrangementer/:path/
  artworks:
    output: true
    sort_by: date
    permalink: /kunstvaerker/:path/

# Defaults (layout for collections)
defaults:
  - scope:
      path: ""
      type: "artworks"
    values:
      layout: "artwork"

# Navigation items
nav:
  - title: Forside
    url: /
  - title: Arrangementer
    url: /arrangementer/
  - title: Kunstværker
    url: /kunstvaerker/
  - title: Om Tegneklubben
    url: /about/
  - title: Blog
    url: /blog/
  - title: Kontakt
    url: /kontakt/

# Mailing list
mailing_list:
  provider: beehiiv
  url: "https://tegneklubben.beehiiv.com/"
  button_text: Tilmeld Nyhedsbrev

# Build settings
future: true
theme: minima

# Sass configuration — suppress deprecation warnings from third-party gems (Minima)
sass:
  quiet_deps: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed settings (Danish)
feed:
  locale: da-DK
  title: Tegneklubben
  subtitle: >-
    Tegne- og malearrangementer — find fællesskab og inspiration.

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - plans/
