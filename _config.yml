# Welcome to Tegneklubben — a drawing and painting event hub in Copenhagen

# Site settings
title: Tegneklubben
description: >-
  Tegneklubben samler tegne- og maleentusiaster i hovedstaden.
  Find arrangementer, mød ligesindede og del dine oplevelser.
baseurl: ""
url: "https://tegneklubben.dk"

# Organization info
author:
  name: Tegneklubben
  email: kontakt@tegneklubben.dk

# Social media (update with actual links)
social:
  instagram: https://instagram.com/tegneklubbenkoe
  facebook: https://facebook.com/tegneklubbenkoe
  type: organization

# Locale & Language (Danish)
locale: da_DK
lang: da
timezone: Europe/Copenhagen
date_format: "%d.%m.%Y"
encoding: UTF-8

# Collections for events
collections:
  events:
    output: true
    sort_by: date
    permalink: /arrangementer/:path/

# Navigation items
nav:
  - title: Forside
    url: /
  - title: Arrangementer
    url: /arrangementer/
  - title: Om Tegneklubben
    url: /about/
  - title: Blog
    url: /blog/
  - title: Kontakt
    url: /kontakt/

# Mailing list (placeholder — update when provider is chosen)
mailing_list:
  provider: placeholder
  url: "https://buttondown.email/tegneklubben"
  button_text: Tilmeld Nyhedsbrev

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed settings (Danish)
feed:
  locale: da-DK
  title: Tegneklubben
  subtitle: >-
    Tegne- og malearrangementer i København — find fællesskab og inspiration.

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - plans/
