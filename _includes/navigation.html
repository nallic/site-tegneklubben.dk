<nav class="site-navigation" aria-label="Hovednavigation">
  <div class="nav-container">
    <span class="nav-brand">
      <a href="{{ '/' | relative_url }}">Tegneklubben</a>
    </span>
    <button class="nav-toggle" aria-label="Åbn navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}"
           class="{% if page.url == item.url %}nav-active{% endif %}">
          {{ item.title }}
        </a>
      {% endfor %}
    </div>
  </div>
</nav>

<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var links = document.querySelector('.nav-links');
    if (!toggle || !links) return;

    // Close menu when a link is clicked
    links.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        links.classList.remove('nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });

    // Collapse menu on scroll after 100px
    var scrollThreshold = 100;
    window.addEventListener('scroll', function() {
      var currentScroll = window.pageYOffset || document.documentElement.scrollTop;
      if (currentScroll > scrollThreshold) {
        links.classList.remove('nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    }, { passive: true });
  })();
</script>
