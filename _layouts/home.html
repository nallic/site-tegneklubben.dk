<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title | default: "Tegneklubben" }} — {{ site.description }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute }}">
  {% feed_meta %}
</head>

<body>
  {% include navigation.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}
</body>

</html>
