<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if site.feed %}
    {% feed_meta %}
  {% endif %}
</head>

<body>
  {% include navigation.html %}

  <main class="site-main">
    <article class="post">
      <h1>{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: site.date_format }}</p>
      {{ content }}
    </article>
  </main>

  {% include footer.html %}
</body>

</html>
